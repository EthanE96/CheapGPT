<!-- Window -->
<div class="flex h-full w-full overflow-hidden">
  <!-- Mobile Backdrop -->
  <div
    *ngIf="isDrawerOpen"
    class="fixed inset-0 bg-black/50 z-20 md:hidden"
    (click)="onDrawerChange()"
  ></div>

  <!-- Left Sidebar: always in DOM so chats preload; CSS controls visibility -->
  <app-drawer
    [(selectedChat)]="selectedChat"
    [(isDrawerOpen)]="isDrawerOpen"
    [(newMessage)]="newMessage"
    [class]="isDrawerOpen
      ? 'flex flex-shrink-0 w-72 fixed inset-y-0 left-0 z-30 md:relative md:z-auto md:inset-auto'
      : 'hidden'"
  ></app-drawer>

  <!-- Right Content -->
  <div class="flex-1 flex flex-col h-screen w-full min-w-0">
    <!-- Header -->
    <app-header [(isDrawerOpen)]="isDrawerOpen" (newChatRequest)="onNewChat()"></app-header>
    <!-- Main Content -->
    <div class="grow min-h-0">
      <app-chat
        [chat]="selectedChat"
        (newMessage)="onNewMessage($event)"
      ></app-chat>
    </div>

    <!-- Footer -->
    <div *ngIf="!selectedChat" class="flex-none pb-2">
      <p class="text-center text-xs opacity-60">
        © Copyright 2024 - 2026, Ethan Edwards. All rights reserved.
      </p>
    </div>
  </div>
</div>
