<!-- Window -->
<div class="flex h-full w-full overflow-hidden">
  <!-- Left Sidebar -->
  <app-drawer
    *ngIf="isDrawerOpen"
    [(selectedChat)]="selectedChat"
    [(isDrawerOpen)]="isDrawerOpen"
    [(newMessage)]="newMessage"
    class="flex flex-shrink-0 overflow-x-hidden max-md:!w-0 w-72"
  ></app-drawer>
  <!-- Right Sidebar -->
  <div class="flex-1 flex flex-col h-screen w-full">
    <!-- Header -->
    <app-header [(isDrawerOpen)]="isDrawerOpen"></app-header>
    <!-- Main Content -->
    <div class="grow overflow-hidden">
      <app-chat
        [chat]="selectedChat"
        (newMessage)="onNewMessage($event)"
      ></app-chat>
    </div>

    <!-- Footer -->
    <div *ngIf="!selectedChat" class="flex-none pb-2">
      <p class="text-center text-xs opacity-60">
        © Copyright 2024 - 2026, Ethan Edwards. All rights reserved.
      </p>
    </div>
  </div>
</div>
