<li>
  <a onclick="my_modal_1.showModal()">Default Model</a>
</li>
<li>
  <a onclick="my_modal_2.showModal()">Default Style</a>
</li>
<dialog id="my_modal_1" class="modal">
  <div class="modal-box">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">
        ✕
      </button>
    </form>
    <!-- Content -->
    <h3 class="text-lg font-bold pb-5">LLM Models</h3>

    <div class="flex flex-col gap-4">
      <div>
        <select
          class="select select-bordered w-full mx-auto"
          [(ngModel)]="selectedModelId"
        >
          <option
            *ngFor="let model of models$ | async"
            [value]="model.modelName"
          >
            {{ model.modelDisplayName }}
          </option>
        </select>
        <div class="label flex-col items-start gap-0.5">
          <span class="label-text-alt"
            >This model will be used by default on all new chats</span
          >
          <span
            *ngIf="modelDescriptions[selectedModelId]"
            class="label-text-alt italic opacity-60"
          >
            {{ modelDescriptions[selectedModelId] }}
          </span>
        </div>
      </div>

      <div>
        <div class="modal-action flex-none">
          <form method="dialog">
            <button
              class="btn btn-primary w-full mx-auto"
              (click)="onSave(selectedModelId)"
            >
              Save
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

<dialog id="my_modal_2" class="modal">
  <div class="modal-box">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">
        ✕
      </button>
    </form>
    <h3 class="text-lg font-bold pb-5">Response Style</h3>

    <div class="flex flex-col gap-4">
      <div>
        <select
          class="select select-bordered w-full mx-auto"
          [(ngModel)]="selectedStyle"
        >
          <option *ngFor="let s of styles" [value]="s.value">
            {{ s.label }}
          </option>
        </select>
        <div class="label flex-col items-start gap-0.5">
          <span class="label-text-alt">This style will be used by default on all new chats</span>
          <span
            *ngIf="styleDescriptions[selectedStyle]"
            class="label-text-alt italic opacity-60"
          >
            {{ styleDescriptions[selectedStyle] }}
          </span>
        </div>
      </div>

      <div>
        <div class="modal-action flex-none">
          <form method="dialog">
            <button
              class="btn btn-primary w-full mx-auto"
              (click)="onSaveStyle(selectedStyle)"
            >
              Save
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
