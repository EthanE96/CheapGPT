<!-- Error toast -->
<div *ngIf="errorMessage" class="toast toast-top toast-center z-50">
  <div class="alert alert-error shadow-lg max-w-md">
    <span>{{ errorMessage }}</span>
    <button class="btn btn-sm btn-ghost" (click)="errorMessage = null">
      ✕
    </button>
  </div>
</div>


<ng-container *ngIf="chat?.message?.length; else newChat">
  <div class="flex flex-col w-full md:w-3/4 px-3 md:px-0 mx-auto h-[90dvh]">
    <div class="flex-none h-10"></div>
    <div
      #scrollContainer
      class="grow overflow-y-auto overflow-x-hidden scroll-smooth px-2 md:px-5"
      (scroll)="onScroll()"
    >
      <ng-container *ngIf="chat">
        <div
          *ngFor="let message of chat.message"
          class="chat py-2 text-sm"
          [ngClass]="{
            'chat-end': message.isUser,
            'chat-start': !message.isUser,
          }"
        >
          <!-- Image -->
          <ng-container *ngIf="!message.isUser">
            <div class="chat-image">
              <div class="w-10 rounded-full">
                <img [src]="(model$ | async)?.logo" />
              </div>
            </div>
          </ng-container>

          <!-- Message -->
          <div
            class="chat-content chat-bubble bg-neutral text-neutral-content text-xs"
            [innerHTML]="toHTML(message.content)"
          ></div>
          <ng-container *ngIf="!message.isUser">
            <div class="chat-footer opacity-50 pl-2 pt-1 flex flex-wrap items-center gap-x-1.5 gap-y-0.5 text-xs">
              <span>{{ (model$ | async)?.modelDisplayName }}</span>
              <ng-container *ngIf="message.style">
                <span class="opacity-40">·</span>
                <span>{{ message.style | titlecase }}</span>
              </ng-container>
              <span class="opacity-40">·</span>
              <span>{{ message.tokens?.totalTokens | number }} tokens</span>
            </div>
          </ng-container>
        </div>
        <!-- Streaming bubble -->
        <div *ngIf="isStreaming" class="chat chat-start py-2 text-sm">
          <div class="chat-image">
            <div class="w-10 rounded-full">
              <img [src]="(model$ | async)?.logo" />
            </div>
          </div>
          <div
            class="chat-content chat-bubble bg-neutral text-neutral-content text-xs"
            [innerHTML]="toHTML(streamingContent || '&nbsp;')"
          ></div>
        </div>
      </ng-container>
    </div>
    <div class="relative">
      <app-input (valueOut)="sendMessage($event)"></app-input>
      <span *ngIf="!isAtBottom" class="overlay">
        <div class="btn btn-sm btn-circle" (click)="scrollToBottom()">
          <i-lucide [img]="ArrowDown" class="w-4 h-4"></i-lucide>
        </div>
      </span>
    </div>
  </div>
</ng-container>

<ng-template #newChat>
  <app-new-chat
    (newMessageOut)="
      sendMessage($event.message, true, $event.modelName, $event.style)
    "
  ></app-new-chat>
</ng-template>
