<div class="flex-none flex gap-2 mt-4 pb-3">
  <input
    #input
    type="text"
    placeholder="Insert message"
    class="input input-bordered w-full"
    (keyup.enter)="sendValue(input.value); input.value = ''"
  />
  <button
    class="btn btn-primary btn-square"
    (click)="sendValue(input.value); input.value = ''"
  >
    <i-lucide [img]="Send" class="w-5 h-5"></i-lucide>
  </button>
</div>
