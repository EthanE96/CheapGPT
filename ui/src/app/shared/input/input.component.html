<div class="flex-none flex gap-2 mt-4 pb-3 items-end">
  <textarea
    #input
    placeholder="Insert message"
    class="textarea textarea-bordered w-full resize-none"
    rows="1"
    (keydown.enter)="onEnterKey($event, input)"
    (input)="autoResize(input)"
  ></textarea>
  <button
    class="btn btn-primary"
    (click)="sendValue(input.value); input.value = ''; autoResize(input)"
  >
    Send
  </button>
</div>
